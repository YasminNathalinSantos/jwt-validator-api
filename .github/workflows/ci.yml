name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Testes automatizados
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Rodar testes
        run: ./mvnw clean test

  docker-build:
    name: Build da imagem Docker
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Build da imagem
        run: docker build -t jwt-validator-api:ci .

      - name: Subir container e testar health check
        run: |
          docker run -d -p 8080:8080 --name jwt-validator-test jwt-validator-api:ci
          echo "Aguardando aplicacao subir..."
          sleep 20
          curl --fail http://localhost:8080/actuator/health || (docker logs jwt-validator-test && exit 1)
          docker stop jwt-validator-test
