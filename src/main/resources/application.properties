spring.application.name=jwt-validator-api

# Logging estruturado com correlacao de requisicao (requestId)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [requestId=%X{requestId}] %logger{36} -- %msg%n

# Actuator - health check e metricas
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
