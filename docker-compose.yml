services:
  jwt-validator-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: jwt-validator-api:latest
    container_name: jwt-validator-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
